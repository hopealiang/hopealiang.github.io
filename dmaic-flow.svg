<svg width="100%" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg" role="img">
<title>DMAIC Lean Six Sigma Process Flow</title>
<desc>Five DMAIC steps: Define, Measure, Analyze, Improve, Control connected by arrows with transparent gradient boxes</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#0D9488" stop-opacity="0.18"/>
<stop offset="100%" stop-color="#0F766E" stop-opacity="0.06"/>
</linearGradient>
<linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#14B8A6" stop-opacity="0.18"/>
<stop offset="100%" stop-color="#0D9488" stop-opacity="0.06"/>
</linearGradient>
<linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#0891B2" stop-opacity="0.18"/>
<stop offset="100%" stop-color="#0E7490" stop-opacity="0.06"/>
</linearGradient>
</defs>

<!-- Box 1: Define -->
<rect x="20" y="60" width="108" height="72" rx="10" fill="url(#g1)" stroke="#0D9488" stroke-width="1" stroke-opacity="0.5"/>
<text font-family="sans-serif" font-size="11" font-weight="600" fill="#0D9488" text-anchor="middle" x="74" y="84">📋 Define</text>
<text font-family="sans-serif" font-size="9" fill="#0F766E" text-anchor="middle" x="74" y="101">Problem</text>
<text font-family="sans-serif" font-size="9" fill="#0F766E" text-anchor="middle" x="74" y="116">&amp; goals</text>

<line x1="128" y1="96" x2="148" y2="96" stroke="#0D9488" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Box 2: Measure -->
<rect x="150" y="60" width="108" height="72" rx="10" fill="url(#g2)" stroke="#0D9488" stroke-width="1" stroke-opacity="0.5"/>
<text font-family="sans-serif" font-size="11" font-weight="600" fill="#0D9488" text-anchor="middle" x="204" y="84">📊 Measure</text>
<text font-family="sans-serif" font-size="9" fill="#0F766E" text-anchor="middle" x="204" y="101">Current</text>
<text font-family="sans-serif" font-size="9" fill="#0F766E" text-anchor="middle" x="204" y="116">process</text>

<line x1="258" y1="96" x2="278" y2="96" stroke="#0D9488" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Box 3: Analyze -->
<rect x="280" y="60" width="108" height="72" rx="10" fill="url(#g3)" stroke="#0891B2" stroke-width="1" stroke-opacity="0.5"/>
<text font-family="sans-serif" font-size="11" font-weight="600" fill="#0891B2" text-anchor="middle" x="334" y="84">🔍 Analyze</text>
<text font-family="sans-serif" font-size="9" fill="#0E7490" text-anchor="middle" x="334" y="101">Root cause</text>
<text font-family="sans-serif" font-size="9" fill="#0E7490" text-anchor="middle" x="334" y="116">analysis</text>

<line x1="388" y1="96" x2="408" y2="96" stroke="#0D9488" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Box 4: Improve -->
<rect x="410" y="60" width="108" height="72" rx="10" fill="url(#g2)" stroke="#0D9488" stroke-width="1" stroke-opacity="0.5"/>
<text font-family="sans-serif" font-size="11" font-weight="600" fill="#0D9488" text-anchor="middle" x="464" y="84">🚀 Improve</text>
<text font-family="sans-serif" font-size="9" fill="#0F766E" text-anchor="middle" x="464" y="101">Implement</text>
<text font-family="sans-serif" font-size="9" fill="#0F766E" text-anchor="middle" x="464" y="116">solutions</text>

<line x1="518" y1="96" x2="538" y2="96" stroke="#0D9488" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Box 5: Control -->
<rect x="540" y="60" width="108" height="72" rx="10" fill="url(#g1)" stroke="#0D9488" stroke-width="1" stroke-opacity="0.5"/>
<text font-family="sans-serif" font-size="11" font-weight="600" fill="#0D9488" text-anchor="middle" x="594" y="84">✅ Control</text>
<text font-family="sans-serif" font-size="9" fill="#0F766E" text-anchor="middle" x="594" y="101">Sustain</text>
<text font-family="sans-serif" font-size="9" fill="#0F766E" text-anchor="middle" x="594" y="116">improvements</text>

<!-- Feedback loop -->
<path d="M594 132 Q594 165 334 165 Q74 165 74 132" fill="none" stroke="#0D9488" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)" opacity="0.5"/>
<text font-family="sans-serif" font-size="9" fill="#0D9488" text-anchor="middle" x="334" y="178" opacity="0.7">continuous improvement</text>

</svg>
